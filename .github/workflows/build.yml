name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON: "3.12"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-latest
            target: macos-amd64
          - os: macos-14
            target: macos-arm64
          - os: windows-latest
            target: windows-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON }}

      - name: Install build deps
        run: pip install pyinstaller websockets orjson

      - name: Build worker
        run: >
          pyinstaller --onefile --clean --noconfirm
          --name proxy-ssh-${{ matrix.target }}
          proxy-ssh.py

      - name: Build client
        run: >
          pyinstaller --onefile --clean --noconfirm
          --name proxy-ssh-client-${{ matrix.target }}
          proxy-ssh-client.py

      - name: Verify worker
        run: ./dist/proxy-ssh-${{ matrix.target }} --help
        if: runner.os != 'Windows'

      - name: Verify client
        run: ./dist/proxy-ssh-client-${{ matrix.target }} --help
        if: runner.os != 'Windows'

      - name: Upload worker
        uses: actions/upload-artifact@v5
        with:
          name: proxy-ssh-${{ matrix.target }}
          path: dist/proxy-ssh-${{ matrix.target }}*

      - name: Upload client
        uses: actions/upload-artifact@v5
        with:
          name: proxy-ssh-client-${{ matrix.target }}
          path: dist/proxy-ssh-client-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
