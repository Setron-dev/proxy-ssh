name: Deploy Relay to Daytona

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'start or stop'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH with token
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.app.daytona.io
          username: ${{ secrets.DAYTONA_TOKEN }}
          password: ${{ secrets.DAYTONA_TOKEN }}
          script: |
            REPO_DIR="$HOME/proxy-ssh"

            if [ "${{ github.event.inputs.action }}" = "stop" ]; then
              echo "Stopping relay..."
              pkill -f relay_standalone.py || true
              echo "Stopped."
              exit 0
            fi

            echo "=== Deploying relay to Daytona ==="

            echo "--- System info ---"
            uname -a
            which python3 || which python || echo "no python"
            python3 --version || true
            which pip3 || which pip || echo "no pip"
            which curl || echo "no curl"
            which tar || echo "no tar"
            echo "---"

            mkdir -p "$REPO_DIR"
            cd "$REPO_DIR"

            echo "Downloading code..."
            curl -sL https://github.com/Setron-dev/proxy-ssh/archive/refs/heads/main.tar.gz | tar xz --strip-components=1

            echo "Installing websockets..."
            python3 -m pip install websockets --break-system-packages 2>/dev/null || \
            python3 -m pip install websockets 2>/dev/null || \
            python3 -c "import websockets; print('websockets already available')" || \
            echo "WARN: websockets not installed, will try to run anyway"

            echo "Stopping old relay if running..."
            pkill -f relay_standalone.py || true
            sleep 1

            echo "Starting relay server..."
            nohup python3 -u server/relay_standalone.py > /tmp/relay.log 2>&1 &
            echo "PID: $!"

            sleep 2
            echo "--- Relay log ---"
            cat /tmp/relay.log
            echo "=== Done ==="
