name: Deploy Relay to Daytona

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'start or stop'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.app.daytona.io
          username: ${{ secrets.DAYTONA_TOKEN }}
          password: ${{ secrets.DAYTONA_TOKEN }}
          script_stop: false
          script: |
            if [ "${{ github.event.inputs.action }}" = "stop" ]; then
              echo "Stopping relay..."
              for pid in $(python3 -c "import os; [print(p) for p in os.listdir('/proc') if p.isdigit() and open(f'/proc/{p}/cmdline','rb').read().find(b'relay_standalone')>=0]" 2>/dev/null); do
                kill $pid 2>/dev/null || true
              done
              echo "Stopped."
              exit 0
            fi

            echo "=== Deploying relay to Daytona ==="
            uname -a
            python3 --version

            REPO_DIR="$HOME/proxy-ssh"
            mkdir -p "$REPO_DIR"

            echo "Downloading code..."
            curl -sL https://github.com/Setron-dev/proxy-ssh/archive/refs/heads/main.tar.gz | tar xz --strip-components=1 -C "$REPO_DIR"

            echo "Installing websockets..."
            python3 -c "import websockets; print('websockets OK')" 2>/dev/null && echo "Already installed" || {
              curl -sS https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
              python3 /tmp/get-pip.py --break-system-packages 2>/dev/null || python3 /tmp/get-pip.py 2>/dev/null || true
              python3 -m pip install websockets --break-system-packages 2>/dev/null || python3 -m pip install websockets 2>/dev/null || true
              python3 -c "import websockets; print('websockets OK')" 2>/dev/null || echo "WARN: websockets not available"
            }

            echo "Starting relay server..."
            cd "$REPO_DIR/server"
            python3 -c "
import subprocess, sys
subprocess.Popen([sys.executable, '-u', 'relay_standalone.py'],
    stdout=open('/tmp/relay.log','w'), stderr=subprocess.STDOUT,
    start_new_session=True)
print('Relay started')
"
            sleep 3
            echo "--- Relay log ---"
            cat /tmp/relay.log
            echo "=== Done ==="
