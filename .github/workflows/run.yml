name: E2E Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install websockets orjson

      - name: Download binaries
        run: |
          echo "=== Downloading release binaries ==="
          curl -sL -o /tmp/proxy-ssh https://github.com/Setron-dev/proxy-ssh/releases/download/v1.0.0/proxy-ssh-linux-amd64
          curl -sL -o /tmp/proxy-ssh-client https://github.com/Setron-dev/proxy-ssh/releases/download/v1.0.0/proxy-ssh-client-linux-amd64
          chmod +x /tmp/proxy-ssh /tmp/proxy-ssh-client

      - name: Verify binaries
        run: |
          echo "=== Worker ==="
          /tmp/proxy-ssh --help
          echo ""
          echo "=== Client ==="
          /tmp/proxy-ssh-client --help

      - name: Run E2E test
        run: python tests/e2e_test.py

  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.app.daytona.io
          username: ${{ secrets.DAYTONA_TOKEN }}
          password: ${{ secrets.DAYTONA_TOKEN }}
          script: |
            echo "=== Deploying worker to Daytona ==="
            python3 --version
            REPO_DIR="$HOME/proxy-ssh"
            mkdir -p "$REPO_DIR"
            echo "Downloading..."
            curl -sL https://github.com/Setron-dev/proxy-ssh/archive/refs/heads/main.tar.gz | tar xz --strip-components=1 -C "$REPO_DIR" 2>/dev/null
            python3 -c "import websockets" 2>/dev/null || { curl -sS https://bootstrap.pypa.io/get-pip.py -o /tmp/gp.py && python3 /tmp/gp.py 2>/dev/null; python3 -m pip install websockets 2>/dev/null; }
            cd "$REPO_DIR/server"
            python3 -c "
import os, signal
for p in os.listdir('/proc'):
    if p.isdigit():
        try:
            c = open(f'/proc/{p}/cmdline','rb').read()
            if b'worker_daytona' in c: os.kill(int(p), signal.SIGTERM)
        except: pass
" 2>/dev/null || true
            python3 -c "
import subprocess, sys
subprocess.Popen([sys.executable, '-u', 'worker_daytona.py'],
    stdout=open('/tmp/worker.log','w'), stderr=subprocess.STDOUT, start_new_session=True)
"
            sleep 2
            cat /tmp/worker.log
            echo "=== Done ==="
