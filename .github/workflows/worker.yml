name: Deploy Worker to Daytona

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ssh.app.daytona.io
          username: ${{ secrets.DAYTONA_TOKEN }}
          password: ${{ secrets.DAYTONA_TOKEN }}
          script: |
            echo "=== Deploying worker ==="
            python3 --version
            
            REPO_DIR="$HOME/proxy-ssh"
            mkdir -p "$REPO_DIR"
            
            echo "Downloading code..."
            curl -sL https://github.com/Setron-dev/proxy-ssh/archive/refs/heads/main.tar.gz | tar xz --strip-components=1 -C "$REPO_DIR"
            
            echo "Installing websockets..."
            python3 -c "import websockets" 2>/dev/null || {
              curl -sS https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
              python3 /tmp/get-pip.py 2>/dev/null
              python3 -m pip install websockets 2>/dev/null
            }
            
            echo "Stopping old worker..."
            python3 -c "
import os, signal
for p in os.listdir('/proc'):
    if p.isdigit():
        try:
            c = open(f'/proc/{p}/cmdline','rb').read()
            if b'worker_daytona' in c:
                os.kill(int(p), signal.SIGTERM)
        except: pass
" 2>/dev/null || true
            sleep 1
            
            echo "Starting worker on port 4096..."
            cd "$REPO_DIR/server"
            python3 -c "
import subprocess, sys
subprocess.Popen([sys.executable, '-u', 'worker_daytona.py'],
    stdout=open('/tmp/worker.log','w'), stderr=subprocess.STDOUT,
    start_new_session=True)
"
            sleep 2
            echo "--- Worker log ---"
            cat /tmp/worker.log
            echo "=== Done ==="
